apiVersion: v1
kind: PersistentVolume
metadata:
  name: notes-pv
  labels:
    type: local
    app: notes-app
spec:
  storageClassName: standard           # GKE'de default storage class
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce                    # Tek pod'dan okuma/yazma
  # GKE için GCE Persistent Disk kullanımı:
  # gcePersistentDisk:
  #   pdName: notes-app-disk           # gcloud compute disks create ile oluşturulan disk
  #   fsType: ext4
  #
  # Yerel geliştirme için:
  hostPath:
    path: "/mnt/notes-data"
  persistentVolumeReclaimPolicy: Retain  # Silinen PVC'den sonra veriyi koru
