<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K8s Not Uygulaması : </title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    .header {
      background: linear-gradient(135deg, #326de6, #00adb5);
      color: white;
      padding: 24px 40px;
      border-radius: 16px;
      text-align: center;
      width: 100%;
      max-width: 600px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(50,109,230,0.3);
    }
    h1 { font-size: 1.8rem; font-weight: 700; }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      margin-top: 8px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }
    .info-bar {
      background: #e8f4f8;
      border-left: 4px solid #326de6;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #444;
      margin-bottom: 20px;
    }
    .input-row {
      display: flex;
      gap: 8px;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #326de6; }
    button {
      padding: 10px 20px;
      background: #326de6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }
    button:hover { background: #2557c7; }
    .note-list { list-style: none; margin-top: 16px; }
    .note-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 8px;
      border-left: 3px solid #00adb5;
    }
    .note-text { font-size: 0.95rem; color: #333; }
    .note-date { font-size: 0.75rem; color: #999; margin-top: 2px; }
    .delete-btn {
      background: #ff4444;
      padding: 6px 12px;
      font-size: 0.8rem;
      border-radius: 6px;
    }
    .delete-btn:hover { background: #cc0000; }
    #status { font-size: 0.85rem; color: #888; text-align: center; margin-top: 12px; }
    .kubernetes-logo {
      font-size: 2rem;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="kubernetes-logo">☸️</div>
    <h1><h1>Kubernetes Not Uygulaması (Kübra v2)</h1></h1>
    <span class="badge" id="hostname-badge">Yükleniyor...</span>
  </div>

  <div class="card">
    <div class="info-bar" id="info-bar">
      Pod bilgisi yükleniyor...
    </div>
    <div class="input-row">
      <input type="text" id="note-input" placeholder="Notunuzu yazın..." />
      <button onclick="addNote()">Ekle</button>
    </div>
    <ul class="note-list" id="note-list"></ul>
    <p id="status"></p>
  </div>

  <script>
    async function loadHealth() {
      const res = await fetch('/health');
      const data = await res.json();
      document.getElementById('hostname-badge').textContent = `Pod: ${data.hostname} | ${data.version}`;
      document.getElementById('info-bar').innerHTML =
        `<strong>Pod:</strong> ${data.hostname} &nbsp;|&nbsp; <strong>Sürüm:</strong> ${data.version} &nbsp;|&nbsp; <strong>Durum:</strong> ${data.status}`;
    }

    async function loadNotes() {
      const res = await fetch('/api/notes');
      const notes = await res.json();
      const list = document.getElementById('note-list');
      list.innerHTML = notes.length === 0
        ? '<li style="color:#aaa;text-align:center;padding:20px">Henüz not yok</li>'
        : notes.map(n => `
          <li class="note-item">
            <div>
              <div class="note-text">${escapeHtml(n.text)}</div>
              <div class="note-date">${new Date(n.createdAt).toLocaleString('tr-TR')}</div>
            </div>
            <button class="delete-btn" onclick="deleteNote(${n.id})">Sil</button>
          </li>`).join('');
    }

    async function addNote() {
      const input = document.getElementById('note-input');
      const text = input.value.trim();
      if (!text) return;
      await fetch('/api/notes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      input.value = '';
      loadNotes();
    }

    async function deleteNote(id) {
      await fetch(`/api/notes/${id}`, { method: 'DELETE' });
      loadNotes();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.getElementById('note-input').addEventListener('keypress', e => {
      if (e.key === 'Enter') addNote();
    });

    loadHealth();
    loadNotes();
  </script>
</body>
</html>
